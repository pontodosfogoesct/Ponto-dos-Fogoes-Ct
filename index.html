<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PdFogões">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Ponto dos Fogões</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#232323;
  --border:#2e2e2e; --border2:#3a3a3a;
  --amber:#f59e0b; --amber-dim:#b45309; --amber-glow:rgba(245,158,11,.14);
  --text:#f1f0ee; --text-dim:#888; --text-muted:#555;
  --red:#ef4444; --green:#22c55e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
.page{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{font-size:2.8rem;margin-bottom:10px}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.35rem;color:var(--amber);letter-spacing:-.3px}
.logo-sub{font-size:.78rem;color:var(--text-muted);margin-top:3px}
.card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px;margin-bottom:22px}
.tab{background:none;border:none;border-radius:8px;padding:9px;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .18s}
.tab.active{background:var(--surface2);color:var(--amber);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.field{margin-bottom:16px}
.field-label{font-size:.72rem;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;display:block}
.field-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
.field-input:focus{border-color:var(--amber-dim);box-shadow:0 0 0 3px var(--amber-glow)}
.field-input::placeholder{color:var(--text-muted)}
.field-input.pin-input{font-family:'IBM Plex Mono',monospace;font-size:1.6rem;letter-spacing:8px;text-align:center}
.btn-login{width:100%;padding:14px;margin-top:4px;background:var(--amber);border:none;border-radius:11px;color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .18s;-webkit-appearance:none}
.btn-login:active{transform:scale(.97);opacity:.9}
.btn-login:disabled{background:var(--border2);color:var(--text-muted);cursor:not-allowed;transform:none}
.api-status{display:flex;align-items:center;gap:7px;justify-content:center;margin-top:18px;font-size:.74rem;font-family:'IBM Plex Mono',monospace;color:var(--text-muted);flex-wrap:wrap}
.ping-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--text-muted);transition:background .3s}
.ping-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.ping-dot.offline{background:var(--red);box-shadow:0 0 6px var(--red)}
.ping-dot.checking{background:var(--amber);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.alerta{margin-top:14px;padding:11px 14px;border-radius:9px;font-size:.82rem;display:none;text-align:center;line-height:1.4}
.alerta.erro{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.alerta.sucesso{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac}
.alerta.aviso{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--amber)}
.shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.bloqueio-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;text-align:center}
.bloqueio-overlay.show{display:flex}
.bloqueio-timer{font-family:'IBM Plex Mono',monospace;font-size:2.2rem;font-weight:700;color:var(--amber)}
</style>
</head>
<body>

<div class="page" id="login-page">
  <div class="logo">
    <div class="logo-icon">🍳</div>
    <div class="logo-name">Ponto dos Fogões</div>
    <div class="logo-sub">Sistema de Gestão v2.0</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-pin"   onclick="setModo('pin')">🔢 PIN Rápido</button>
      <button class="tab"        id="tab-senha" onclick="setModo('senha')">🔐 Senha</button>
    </div>

    <div class="field">
      <label class="field-label" for="campo-id">ID do Funcionário</label>
      <input class="field-input" id="campo-id" type="tel" inputmode="numeric"
             maxlength="6" placeholder="001" autocomplete="off" spellcheck="false"
             onkeydown="teclaDown(event)">
    </div>

    <div class="field" id="wrap-pin">
      <label class="field-label" for="campo-pin">PIN (4 dígitos)</label>
      <input class="field-input pin-input" id="campo-pin" type="password"
             inputmode="numeric" maxlength="4" placeholder="· · · ·"
             autocomplete="current-password" spellcheck="false"
             oninput="checkAutoPin()" onkeydown="teclaDown(event)">
    </div>

    <div class="field" id="wrap-senha" style="display:none">
      <label class="field-label" for="campo-senha">Senha</label>
      <input class="field-input" id="campo-senha" type="password"
             placeholder="Senha completa" autocomplete="current-password"
             spellcheck="false" onkeydown="teclaDown(event)">
    </div>

    <button class="btn-login" id="btn-entrar" onclick="entrar()">Entrar</button>
    <div class="alerta" id="alerta"></div>

    <div class="api-status">
      <div class="ping-dot checking" id="ping-dot"></div>
      <span id="ping-status">verificando...</span>
      <span id="ping-versao"></span>
    </div>
  </div>
</div>

<div class="bloqueio-overlay" id="bloqueio-overlay">
  <div style="font-size:3rem">🔒</div>
  <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--red)">Acesso Bloqueado</div>
  <div style="font-size:.84rem;color:var(--text-dim);line-height:1.5">Muitas tentativas incorretas.<br>Aguarde para tentar de novo.</div>
  <div class="bloqueio-timer" id="bloqueio-timer">15:00</div>
</div>

<script>
// ── URL DA API — fixa, sem necessidade de configuração ────
const API_URL = 'https://script.google.com/macros/s/AKfycbxRdg4HdnyLXQI8MZa7x0wJ13NQoV177Fxj25AgDOXvCjtgmCWfwXkHIX5LKnOx4XMnzw/exec';

let modo    = 'pin';
let logando = false;

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  ping();
  // Verifica sessão existente
  const token = localStorage.getItem('pfg_token');
  const nivel = localStorage.getItem('pfg_nivel') || '';
  if (token) {
    apiGet('MINHAS_PERMISSOES', { token })
      .then(d => {
        if (d && d.ok) {
          window.location.href = ['ADM','FIN'].includes(nivel) ? 'dashboard.html' : 'os.html';
        } else {
          localStorage.removeItem('pfg_token');
        }
      })
      .catch(() => {});
  }
  setTimeout(() => document.getElementById('campo-id').focus(), 200);
});

// ── API — GET e POST com suporte ao redirect do Apps Script ──
// O Apps Script faz redirect 302. O fetch segue automaticamente,
// mas precisa de credentials:'omit' para não travar no CORS.
async function apiGet(acao, params = {}) {
  const qs = new URLSearchParams({ acao, ...params });
  const res = await fetch(API_URL + '?' + qs.toString(), {
    method: 'GET',
    credentials: 'omit',
    redirect: 'follow'
  });
  return res.json();
}

async function apiPost(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    credentials: 'omit',
    redirect: 'follow',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  return res.json();
}

// ── PING ─────────────────────────────────────────────────
async function ping() {
  const dot = document.getElementById('ping-dot');
  const txt = document.getElementById('ping-status');
  const ver = document.getElementById('ping-versao');
  dot.className = 'ping-dot checking';
  txt.textContent = 'verificando...';
  try {
    const d = await apiGet('PING');
    if (d && d.ok) {
      dot.className   = 'ping-dot online';
      txt.textContent = 'sistema online';
      ver.textContent = d.versao ? ' · v' + d.versao : '';
    } else {
      throw new Error('sem resposta ok');
    }
  } catch(e) {
    dot.className   = 'ping-dot offline';
    txt.textContent = 'sem conexão';
    ver.textContent = '';
  }
}

// ── TABS ─────────────────────────────────────────────────
function setModo(m) {
  modo = m;
  document.getElementById('tab-pin').classList.toggle('active',   m === 'pin');
  document.getElementById('tab-senha').classList.toggle('active', m === 'senha');
  document.getElementById('wrap-pin').style.display   = m === 'pin'   ? '' : 'none';
  document.getElementById('wrap-senha').style.display = m === 'senha' ? '' : 'none';
  document.getElementById('campo-pin').value   = '';
  document.getElementById('campo-senha').value = '';
  esconderAlerta();
  setTimeout(() => document.getElementById(m === 'pin' ? 'campo-pin' : 'campo-senha').focus(), 60);
}

// AUTO-SUBMIT quando PIN tem 4 dígitos
function checkAutoPin() {
  if (document.getElementById('campo-pin').value.length === 4) {
    setTimeout(entrar, 180);
  }
}

// ENTER e TAB nos campos
function teclaDown(e) {
  if (e.key === 'Enter') { e.preventDefault(); entrar(); return; }
  if (e.key === 'Tab') {
    e.preventDefault();
    const ativo = document.activeElement.id;
    if (ativo === 'campo-id') {
      document.getElementById(modo === 'pin' ? 'campo-pin' : 'campo-senha').focus();
    } else {
      document.getElementById('campo-id').focus();
    }
  }
}

// ── LOGIN ─────────────────────────────────────────────────
async function entrar() {
  if (logando) return;

  const idVal    = document.getElementById('campo-id').value.trim();
  const pinVal   = document.getElementById('campo-pin').value.trim();
  const senhaVal = document.getElementById('campo-senha').value.trim();

  if (!idVal) {
    mostrarAlerta('Informe o ID do funcionário.', 'erro');
    document.getElementById('campo-id').focus();
    return;
  }
  if (modo === 'pin' && !pinVal) {
    mostrarAlerta('Informe o PIN.', 'erro');
    document.getElementById('campo-pin').focus();
    return;
  }
  if (modo === 'senha' && !senhaVal) {
    mostrarAlerta('Informe a senha.', 'erro');
    document.getElementById('campo-senha').focus();
    return;
  }
  if (modo === 'pin' && !/^\d{4}$/.test(pinVal)) {
    mostrarAlerta('PIN deve ter exatamente 4 dígitos numéricos.', 'erro');
    sacudir('campo-pin');
    return;
  }

  logando = true;
  const btn = document.getElementById('btn-entrar');
  btn.disabled    = true;
  btn.textContent = '⏳ Entrando...';
  esconderAlerta();

  try {
    const payload = {
      acao: modo === 'pin' ? 'LOGIN_PIN' : 'LOGIN_SENHA',
      id_funcionario: idVal,
      ...(modo === 'pin' ? { pin: pinVal } : { senha: senhaVal })
    };

    const data = await apiPost(payload);

    if (data && data.ok) {
      const u = data.dados.usuario;
      localStorage.setItem('pfg_token',   data.dados.token);
      localStorage.setItem('pfg_nivel',   u.nivel_acesso);
      localStorage.setItem('pfg_usuario', JSON.stringify(u));
      localStorage.setItem('pfg_id',      u.id_funcionario);

      mostrarAlerta('✓ Bem-vindo, ' + (u.nome_completo || '').split(' ')[0] + '!', 'sucesso');
      btn.textContent = '✅';

      setTimeout(() => {
        window.location.href = ['ADM','FIN'].includes(u.nivel_acesso) ? 'dashboard.html' : 'os.html';
      }, 700);

    } else {
      const msg = (data && data.mensagem) ? data.mensagem : 'Credenciais inválidas.';
      if (data && (data.codigo === 429 || msg.toLowerCase().includes('bloqueado'))) {
        iniciarBloqueio(msg);
      } else {
        mostrarAlerta(msg, 'erro');
        sacudir(modo === 'pin' ? 'campo-pin' : 'campo-senha');
        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
      }
      btn.disabled    = false;
      btn.textContent = 'Entrar';
    }

  } catch(err) {
    mostrarAlerta('Erro de conexão: ' + err.message, 'erro');
    btn.disabled    = false;
    btn.textContent = 'Entrar';
  } finally {
    logando = false;
  }
}

// ── BLOQUEIO ──────────────────────────────────────────────
let bloqueioIV = null;
function iniciarBloqueio(msg) {
  document.getElementById('bloqueio-overlay').classList.add('show');
  const el = document.getElementById('bloqueio-timer');
  let s = 15 * 60;
  const m = (msg || '').match(/(\d+)\s*minuto/);
  if (m) s = parseInt(m[1]) * 60;
  clearInterval(bloqueioIV);
  bloqueioIV = setInterval(() => {
    s--;
    el.textContent = String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    if (s <= 0) { clearInterval(bloqueioIV); document.getElementById('bloqueio-overlay').classList.remove('show'); }
  }, 1000);
}

// ── UI HELPERS ────────────────────────────────────────────
function mostrarAlerta(msg, tipo) {
  const el = document.getElementById('alerta');
  el.textContent   = msg;
  el.className     = 'alerta ' + tipo;
  el.style.display = 'block';
}
function esconderAlerta() {
  document.getElementById('alerta').style.display = 'none';
}
function sacudir(id) {
  const el = document.getElementById(id);
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', event => {
    if (event.data?.type === 'NAVIGATE' && event.data.url) window.location.href = event.data.url;
  });
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
